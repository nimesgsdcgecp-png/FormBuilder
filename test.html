<!DOCTYPE html>
<html>
<head>
  <title>Button Type Test</title>
</head>
<body>
  <form id="form" onsubmit="event.preventDefault(); document.getElementById('log').innerText += 'Form submitted!\n';">
    <button id="btn" type="button" onclick="changeType()">Next (type=button)</button>
  </form>
  <pre id="log"></pre>
  <script>
    function changeType() {
      document.getElementById('log').innerText += 'Button clicked\n';
      // Synchronously change the button type to submit
      var btn = document.getElementById('btn');
      btn.type = 'submit';
      btn.innerText = 'Submit (type=submit)';
    }
  </script>
</body>
</html>
